name: HIBP Breach Filter
on:
  workflow_dispatch:
    inputs:
      target_breach:
        description: 'Breach Name'
        required: true
      user_manifest:
        description: 'Stringified JSON'
        required: true

jobs:
  filter_logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 

      - name: Run Filter Script
        shell: python
        env:
          TARGET: ${{ github.event.inputs.target_breach }}
          MANIFEST: ${{ github.event.inputs.user_manifest }}
        run: |
        import os, json
        target = os.getenv('TARGET')
        raw_manifest = os.getenv('MANIFEST', '').strip()
        
        # If S1 sent it wrapped in single quotes, strip them off
        if raw_manifest.startswith("'") and raw_manifest.endswith("'"):
            raw_manifest = raw_manifest[1:-1]
        
        try:
            manifest = json.loads(raw_manifest)
            affected_users = [f"{u}@example.com" for u, b in manifest.items() if target in b]
            print(f"RESULT_START\n{json.dumps({'breach': target, 'users': affected_users})}\nRESULT_END")
        except Exception as e:
            print(f"Error parsing JSON: {e}")
            print(f"Raw data received: {raw_manifest}")
            exit(1)
